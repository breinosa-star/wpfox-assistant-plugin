services:

  # ── MySQL ────────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: grayfox_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - grayfox_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "wordpress", "-pwordpress"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── WordPress ────────────────────────────────────────────────────────────────
  wordpress:
    image: wordpress:latest
    container_name: grayfox_wordpress
    ports:
      - "8081:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
        define('ALTERNATE_WP_CRON', true);
    volumes:
      - grayfox_wp_data:/var/www/html
      # Live-mount the plugin — edits to PHP/JS reflect immediately (no rebuild needed)
      - .:/var/www/html/wp-content/plugins/grayfox
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── WP-CLI (run on demand: docker compose run --rm wpcli <command>) ──────────
  wpcli:
    image: wordpress:cli
    container_name: grayfox_wpcli
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - grayfox_wp_data:/var/www/html
      - .:/var/www/html/wp-content/plugins/grayfox
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - cli   # only runs when explicitly invoked

  # ── Setup service (runs once to install WP + plugin) ────────────────────────
  setup:
    image: wordpress:cli
    container_name: grayfox_setup
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - grayfox_wp_data:/var/www/html
      - .:/var/www/html/wp-content/plugins/grayfox
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sleep 8
        wp core install --url=http://localhost:8081 --title="GrayFox Dev" --admin_user=admin --admin_password=admin --admin_email=admin@grayfox.local --skip-email --allow-root --path=/var/www/html 2>/dev/null || echo "WP already installed, skipping"
        wp plugin install action-scheduler --activate --allow-root --path=/var/www/html --quiet
        wp plugin activate grayfox --allow-root --path=/var/www/html --quiet
        wp option update grayfox_license_key "gfx_localdev000000000000000000000000000000000" --allow-root --path=/var/www/html
        wp option update grayfox_license_tier "pro" --allow-root --path=/var/www/html
        wp option update grayfox_license_status "active" --allow-root --path=/var/www/html
        wp option update grayfox_license_key_prefix "gfx_loca" --allow-root --path=/var/www/html
        wp option update grayfox_license_token "pro|active|1805893538|localhost|gfx_loca|QDopMpTFGrF8R-q0rxwJIucsOzMrQ2i1pmwluoHSrqyvfdfmCNPNkh10XaVl1kAIKCWCn7x9HroKUmYgWcz7DA==" --allow-root --path=/var/www/html
        echo "=================================================="
        echo " GrayFox ready at http://localhost:8081"
        echo " Admin:  http://localhost:8081/wp-admin"
        echo " Login:  admin / admin"
        echo " Tier:   pro (all features unlocked)"
        echo "=================================================="
    profiles:
      - setup   # run once: docker compose --profile setup up setup

volumes:
  grayfox_db_data:
  grayfox_wp_data:
